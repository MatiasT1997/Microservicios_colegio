server:
  port: 8080
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
spring:
  application:
    name: apigateway
  cloud:
    gateway:
      routes:
        # Gestion Academica: cursos, asignaturas, evaluaciones, notas
        - id: gestionacademica
          uri: lb://GESTIONACADEMICA
          predicates:
            - Path=/curso/**,/asignatura/**,/evaluacion/**,/nota/**
          filters:
            - AuthenticationFilterinig
        # Asistencia y Anotaciones
        - id: asistencia
          uri: lb://ASISTENCIA
          predicates:
            - Path=/asistencia/**,/anotacion/**,/integracion/**
          filters:
            - AuthenticationFilterinig
        # Comunicaciones: mensajes y notificaciones
        - id: comunicaciones
          uri: lb://COMUNICACIONES
          predicates:
            - Path=/mensaje/**
          filters:
            - AuthenticationFilterinig
