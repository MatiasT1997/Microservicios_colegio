spring.application.name=gestionacademica
server.port=8081

# ---- Eureka (Service Discovery) ----
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ---- Actuator / Spring Boot Admin ----
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ===========================================================
#  Perfil por defecto: H2 en memoria (arranque sin BD externa)
# ===========================================================
spring.datasource.url=jdbc:h2:mem:academicadb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# ===========================================================
#  Para usar PostgreSQL (BD por servicio), activar el perfil
#  "postgres":  --spring.profiles.active=postgres
#  Configuracion en application-postgres.properties
# ===========================================================
