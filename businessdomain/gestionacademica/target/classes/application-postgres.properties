# Perfil PostgreSQL para Gestion Academica (BD propia por servicio)
# Activar con: --spring.profiles.active=postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/academica_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:colegio}
spring.datasource.password=${DB_PASSWORD:colegio}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
