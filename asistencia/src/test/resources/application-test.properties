spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
spring.rabbitmq.host=localhost
resilience4j.circuitbreaker.instances.comunicacionesService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.comunicacionesService.sliding-window-size=5
resilience4j.circuitbreaker.instances.comunicacionesService.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.comunicacionesService.permitted-number-of-calls-in-half-open-state=3
